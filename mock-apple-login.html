<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with Apple ID</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Text:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fafafa;
            color: #1d1d1f;
        }
        .apple-card {
            background: #ffffff;
            width: 580px;
            padding: 48px;
            border-radius: 18px;
            border: 1px solid #d2d2d7;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 520px;
        }
        @media (max-width: 580px) {
            body {
                background-color: #ffffff;
            }
            .apple-card {
                width: 100%;
                padding: 24px;
                min-height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
        .apple-logo {
            font-size: 54px;
            margin-bottom: 24px;
            color: #000000;
            line-height: 1;
        }
        .title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: #86868b;
            margin-bottom: 32px;
        }
        .input-wrapper {
            position: relative;
            width: 320px;
            margin-bottom: 12px;
        }
        .apple-input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            font-size: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            outline: none;
            background-color: #ffffff;
            color: #1d1d1f;
            transition: border-color 0.15s;
        }
        .apple-input:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
        }
        .submit-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #e8e8ed;
            border: none;
            color: #86868b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
        }
        .submit-arrow:hover {
            background-color: #0071e3;
            color: #ffffff;
        }
        .remember-me {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #515154;
            margin-top: 16px;
            margin-bottom: 24px;
        }
        .remember-me input {
            cursor: pointer;
        }
        .divider {
            width: 320px;
            height: 1px;
            background-color: #e8e8ed;
            margin: 24px 0;
        }
        .forgot-link {
            font-size: 14px;
            color: #0066cc;
            text-decoration: none;
            margin-bottom: 8px;
            display: block;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .create-link {
            font-size: 14px;
            color: #515154;
            text-decoration: none;
        }
        .create-link span {
            color: #0066cc;
        }
        .create-link span:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="apple-card">
        <div class="apple-logo"></div>
        <div class="title">Sign in with Apple ID</div>
        <div class="subtitle">Use your Apple ID to sign in to Styluxe.</div>

        <form id="appleForm" onsubmit="handleAppleSubmit(event)" style="display: flex; flex-direction: column; align-items: center;">
            <div class="input-wrapper">
                <input type="text" class="apple-input" id="appleIdField" placeholder="Apple ID" required autocomplete="off">
                <button type="submit" class="submit-arrow" aria-label="Sign In">➔</button>
            </div>
            
            <div class="remember-me">
                <input type="checkbox" id="keepSignedIn" checked>
                <label for="keepSignedIn">Keep me signed in</label>
            </div>
        </form>

        <div class="divider"></div>

        <a href="#" class="forgot-link" onclick="simulateAppleLogin('apple.user@icloud.com')">Forgot Apple ID or password?</a>
        <a href="#" class="create-link" onclick="simulateAppleLogin('apple.user@icloud.com')">Don't have an Apple ID? <span>Create yours now.</span></a>
    </div>

    <script>
        function simulateAppleLogin(email) {
            const namePart = email.split('@')[0];
            const formattedName = namePart.charAt(0).toUpperCase() + namePart.slice(1);
            
            if (window.opener) {
                // Send back to parent window
                window.opener.postMessage({
                    type: 'oauth-success',
                    provider: 'Apple',
                    name: formattedName + " (Apple)",
                    email: email
                }, window.location.origin);
                window.close();
            } else {
                // Redirect style (mobile/in-app browser fallback)
                const mainPageUrl = window.location.origin + window.location.pathname.replace('mock-apple-login.html', 'index.html');
                const redirectUrl = `${mainPageUrl}?social_login=apple&email=${encodeURIComponent(email)}&name=${encodeURIComponent(formattedName + " (Apple)")}`;
                window.location.href = redirectUrl;
            }
        }

        function handleAppleSubmit(event) {
            event.preventDefault();
            const appleId = document.getElementById("appleIdField").value.trim();
            let email = appleId;
            
            // If appleId doesn't look like email, append icloud
            if (!email.includes("@")) {
                email = email.toLowerCase() + "@icloud.com";
            }
            
            simulateAppleLogin(email);
        }
    </script>
</body>
</html>
